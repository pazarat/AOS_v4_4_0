layer:
  id: truth_runtime
  type: layer_mini_runtime
  entrypoint: aos_capabilities/truth_runtime/main.py
  role: Resolve truth requirements, build truth packets, check sufficiency, and issue arbiter decisions.
commands:
  - truth.resolve_requirement
  - truth.build_packet
  - truth.produce_authoritative_packet
  - truth.validate_response
required_gateway_methods:
  - describe
  - healthcheck
  - validate_contract
  - execute
permissions:
  filesystem: scoped_truth_roots
  network: false
